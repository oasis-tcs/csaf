name: JSONPath Test (CSAF 2.1)

on:
  push:
    paths:
      - 'csaf_2.1/**'
  pull_request:
    paths:
      - 'csaf_2.1/**'

jobs:
  jsonpath-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Prepare environment
      run: |
        sudo apt-get update -q && sudo apt-get install -y --no-install-recommends -qq \
          python3 \
          python3-pip \
          python3-setuptools \
          python3-wheel
        pip3 install jsonpath
    - name: Check jsonpath version
      run: python3 -c "from importlib.metadata import version; print(version('jsonpath'))"
    - name: Test syntax of jsonpath
      run: ./csaf_2.1/test/jsonpath/check_jsonpaths.py ./csaf_2.1/prose/edit/src/*.md
