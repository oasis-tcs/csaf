assembly:
  binder: bind.txt
  source-path: src
  build-path: build
  etc-path: etc
  first-authored-section: '# Introduction'
  binder-ignores:
    gfm-plus: []
    html: []
    pdf:
    - frontmatter.md
  delete-when: []

structure:
  section-type-prefixes: [Appendix]

enumeration:
  sections:
    l1-dot: true
    sub-dot: false
    reference-style: number
    lut:
      label-to-display: section-label-to-display.json
      display-to-label: section-display-to-label.json
      display-to-text: section-display-to-text.json
  examples:
    track: true
    global-start: 4321
    lut:
      local-to-global: example-local-to-global.json
      global-to-local: example-global-to-local.json

references:
  citations:
    sources:
    - introduction-03-normative-references.md
    - introduction-04-informative-references.md
    skip-prefixes:
    - '#'
    keyword: cite
  sections:
    keyword: sec
  glossary:
    sources:
    - introduction-02-terminology-glossary.md
  tables:
    keyword: tab  # Trigger keyword for inline table references: [tab](#tab:label).
    display-prefix: table  # Display prefix used when expanding [tab](#label) → 'Table N'.


quality:
  rules:
    - etc/rules/spec.rules.yaml

channels:
  html:
    title: Common Security Advisory Framework Version 2.1
    inject:
      css-base: ../share/style/base.css
      css-skin: ../share/style/skin.css
      images: false
      intro-trigger: '<h1 id="1-introduction'
      logo-data-url: ../media/logo-data-url.txt
      logo-remote-url: 'https://docs.oasis-open.org/templates/OASISLogo-v3.0.png'
      toc-trigger: '<h1 id="table-of-contents'
  pdf:
    logo-local-path: images/OASISLogo-v3.0.png
    logo-remote-url: 'https://docs.oasis-open.org/templates/OASISLogo-v3.0.png'
  typst:
    page-break-l1: true
